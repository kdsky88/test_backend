spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    placeholders:
      legacyOwnerEmail: ${TODO_LEGACY_OWNER_EMAIL:}

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000
