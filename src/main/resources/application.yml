spring:
  datasource:
    # sslmode: 외부 관리형 DB(Neon 등)는 require. 로컬/내부는 prefer(있으면 SSL, 없으면 평문).
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:testdb}?sslmode=${DB_SSLMODE:prefer}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:testuser}
    password: ${DB_PASSWORD:testpassword}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    placeholders:
      legacyOwnerEmail: ${TODO_LEGACY_OWNER_EMAIL:}

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-hs256}
  # access 토큰 7일(604800000ms). 짧으면(1h) refresh가 잦아 조기 로그아웃 위험↑.
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:604800000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
