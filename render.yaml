# Render Blueprint: Docker 웹 서비스 (DB는 외부 Neon 무료 Postgres 사용)
# DB는 Render 무료 Postgres가 만료돼 Neon으로 이전함. DB_* 값은 Render 대시보드
# 환경변수에 직접 설정(sync: false) — 비밀번호를 레포에 커밋하지 않기 위함.
services:
  - type: web
    name: test-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      # 아래 DB_*는 Render 대시보드에서 Neon 값으로 설정(레포에 값 저장 X).
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE # Neon 등 외부 DB는 require
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TODO_LEGACY_OWNER_EMAIL
        value: ""
      # refresh 토큰 수명 90일(=90*86400000ms) → 재로그인 거의 불필요
      - key: JWT_REFRESH_TOKEN_EXPIRATION
        value: "7776000000"
